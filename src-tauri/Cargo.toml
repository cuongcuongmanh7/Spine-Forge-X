[package]
name = "spineforge-x"
version = "0.2.3"
description = "Batch export and version upgrade workflow for Spine projects."
authors = ["SpineForge X"]
edition = "2021"

[lib]
name = "spineforge_x_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.2.0", features = [] }

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tauri = { version = "2.5.0", features = [] }
tauri-plugin-dialog = "2.4.0"
chrono = { version = "0.4", default-features = false, features = ["clock"] }
tokio = { version = "1.43.0", features = ["process", "io-util", "time", "macros", "rt-multi-thread", "sync"] }
walkdir = "2.5.0"
tauri-plugin-updater = "2.10.1"
tauri-plugin-process = "2.3.1"
